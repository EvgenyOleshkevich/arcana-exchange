<section class="page cards-page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Arcana Exchange</p>
      <h1>{{ t()('cardsTitle') }}</h1>
      <p class="page-description">
        {{ t()('cardsDescription') }}
      </p>
    </div>

    <label class="server-select">
      <span>{{ t()('cardsServer') }}</span>
      <select
          class="server-select__control"
          name="server"
          [ngModel]="selectedServer()"
          (ngModelChange)="onServerChange($event)"
      >
        @for (server of servers; track server.value) {
            <option [value]="server.value">
            {{ server.label }}
            </option>
        }
      </select>
    </label>
  </header>

  <main class="cards-layout">
    <section class="cards-panel">
      <div class="cards-panel-header">
        <div>
          <h2>{{ t()('cardsAllCards') }}</h2>
        </div>
      </div>

      <app-card-list
        (cardSelected)="onLoadPlayersExchangingCard($event)"
      />
    </section>

    <aside class="exchange-panel">
      @if (cardExchange() && selectedCardId()) {
        <app-card-exchange
          [exchange]="cardExchange()!"
          [cardId]="selectedCardId()!"
          (close)="onCloseExchange()"
        />
      } @else {
        <div class="empty-exchange">
          <div class="empty-card-preview">
            ✦
          </div>

          <h2>{{ t()('cardsSelectCard') }}</h2>
          <p>
            {{ t()('cardsSelectCardDesc') }}
          </p>
        </div>
      }
    </aside>
  </main>
</section>
