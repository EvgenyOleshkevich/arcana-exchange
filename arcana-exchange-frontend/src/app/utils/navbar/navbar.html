<header class="navbar">
  <div class="navbar__content">
        <div class="navbar__left">
            <a class="navbar__brand" routerLink="/cards">
                <img
                    class="navbar__brand-logo"
                    src="/assets/images/brand/arcana-logo.png"
                    alt=""
                    aria-hidden="true"
                />
                <span>Arcana Exchange</span>
            </a>
        </div>

        <button
            type="button"
            class="navbar__menu-toggle"
            [class.active]="isMenuOpen()"
            (click)="onToggleMenu()"
            aria-label="Navigation menu"
        >
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="navbar__center" [class.open]="isMenuOpen()">
            <a
                routerLink="/cards"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }"
                (click)="onCloseMenu()">{{ t()('navCards') }}</a>
            <a
                routerLink="/player"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }"
                (click)="onCloseMenu()">{{ t()('navPlayer') }}</a>
            <a
                routerLink="/about"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }"
                (click)="onCloseMenu()">{{ t()('navAbout') }}</a>
        </nav>

        <div class="navbar__left navbar__left--actions">
            <label class="language-select">
                <span class="language-select__label">{{ t()('navLanguage') }}</span>

                <select
                    class="language-select__control"
                    [value]="language()"
                    (change)="onLanguageChange($event)"
                >
                    <option value="ru">RU</option>
                    <option value="en">EN</option>
                </select>
            </label>
        </div>
    </div>
</header>
